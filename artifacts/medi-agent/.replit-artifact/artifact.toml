kind = "web"
previewPath = "/"
title = "MediAgent AI"
version = "1.0.0"
id = "artifacts/medi-agent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25270

[services.development]
run = "pnpm --filter @workspace/medi-agent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medi-agent", "run", "build" ]
publicDir = "artifacts/medi-agent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25270"
BASE_PATH = "/"
